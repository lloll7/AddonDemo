name: Build ARMv7 Docker Images

on:
  # 手动触发
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'addOnDemoClient/**'
      - 'addonDemoServer/**'
      - '.github/workflows/master-docker-hub-arm.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'addOnDemoClient/**'
      - 'addonDemoServer/**'

env:
  # 设置公共环境变量
  DOCKERHUB_USERNAME: lin77777
  CLIENT_IMAGE: addondemoclient
  SERVER_IMAGE: addondemoserver
  VERSION: v1.0  # 你可以使用 ${{ github.sha }} 或其它版本策略

jobs:
  build-client:
    name: Build Client ARMv7 Image
    # 使用 GitHub 提供的原生 ARM 运行器
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: addondemoclient

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Client image
      uses: docker/build-push-action@v5
      with:
        context: ./addOnDemoClient
        platforms: linux/arm/v7
        push: true
        tags: |
          ${{ env.DOCKERHUB_USERNAME }}/${{ env.CLIENT_IMAGE }}:${{ env.VERSION }}-armv7
          ${{ env.DOCKERHUB_USERNAME }}/${{ env.CLIENT_IMAGE }}:latest-armv7
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build-server:
    name: Build Server ARMv7 Image
    # 使用 GitHub 提供的原生 ARM 运行器
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: addonDemoServer

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Server image
      uses: docker/build-push-action@v5
      with:
        context: ./addOnDemoServer
        platforms: linux/arm/v7
        push: true
        tags: |
          ${{ env.DOCKERHUB_USERNAME }}/${{ env.SERVER_IMAGE }}:${{ env.VERSION }}-armv7
          ${{ env.DOCKERHUB_USERNAME }}/${{ env.SERVER_IMAGE }}:latest-armv7
        cache-from: type=gha
        cache-to: type=gha,mode=max